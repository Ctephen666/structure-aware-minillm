seed: 42

tokenizer_type: hf
tokenizer_name: uer/gpt2-chinese-cluecorpussmall
hf_cache_dir: .cache/huggingface
hf_local_files_only: false
vocab_size: 21128

block_size: 1024
n_layer: 26
n_head: 12
n_embd: 768
dropout: 0.1
max_depth: 32
num_states: 9
lambda_depth: 0.03
lambda_state: 0.05

batch_size: 16
gradient_accumulation_steps: 4
learning_rate: 5.0e-5
min_lr: 5.0e-6
warmup_steps: 100
weight_decay: 0.01
max_steps: 2000
eval_interval: 500
save_interval: 1000
eval_iters: 50
grad_clip: 1.0
num_workers: 0

amp: true
amp_dtype: bfloat16
float32_matmul_precision: high
gradient_checkpointing: true

streaming_train: false
streaming_valid: false

train_path: data/sft/final/sft_train_200m.jsonl
valid_path: data/sft/final/sft_val_200m.jsonl
init_from_checkpoint: checkpoints/struct_pretrain_200m_zh_best.pt
resume_optimizer: false
checkpoint_path: checkpoints/sft_200m_120k/struct_sft_200m_120k.pt
