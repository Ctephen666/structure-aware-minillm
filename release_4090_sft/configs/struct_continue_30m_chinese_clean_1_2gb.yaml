seed: 42

tokenizer_type: hf
tokenizer_name: uer/gpt2-chinese-cluecorpussmall
hf_cache_dir: .cache/huggingface
hf_local_files_only: true

block_size: 512
n_layer: 8
n_head: 7
n_embd: 448
dropout: 0.1

max_depth: 32
num_states: 9
lambda_depth: 0.05
lambda_state: 0.10

batch_size: 8
gradient_accumulation_steps: 1
learning_rate: 0.00006
weight_decay: 0.1
max_steps: 100000
max_train_seconds: 14400
eval_interval: 500
save_interval: 2000
eval_iters: 50
grad_clip: 1.0
num_workers: 0

amp: true
amp_dtype: float16
float32_matmul_precision: high

streaming_train: true
streaming_valid: true
streaming_stride: 512

train_sources:
  - name: fineweb_edu_v22_general
    path: data/pretrain/chinese_clean_1_2gb/fineweb_edu_v22_general_train.jsonl
    weight: 45
  - name: wikipedia_zh
    path: data/pretrain/chinese_clean_1_2gb/wikipedia_zh_train.jsonl
    weight: 25
  - name: fineweb_edu_v22_technical
    path: data/pretrain/chinese_clean_1_2gb/fineweb_edu_v22_technical_train.jsonl
    weight: 15
  - name: chinese_cosmopedia
    path: data/pretrain/chinese_clean_1_2gb/chinese_cosmopedia_train.jsonl
    weight: 15

valid_sources:
  - name: fineweb_edu_v22_general
    path: data/pretrain/chinese_clean_1_2gb/fineweb_edu_v22_general_valid.jsonl
    weight: 45
  - name: wikipedia_zh
    path: data/pretrain/chinese_clean_1_2gb/wikipedia_zh_valid.jsonl
    weight: 25
  - name: fineweb_edu_v22_technical
    path: data/pretrain/chinese_clean_1_2gb/fineweb_edu_v22_technical_valid.jsonl
    weight: 15
  - name: chinese_cosmopedia
    path: data/pretrain/chinese_clean_1_2gb/chinese_cosmopedia_valid.jsonl
    weight: 15

init_from_checkpoint: checkpoints/struct_pretrain_30m_chinese_70_30_continued.pt
resume_optimizer: false
checkpoint_path: checkpoints/struct_pretrain_30m_chinese_clean_continued.pt
