seed: 42

tokenizer_type: hf
tokenizer_name: uer/gpt2-chinese-cluecorpussmall
hf_cache_dir: .cache/huggingface
hf_local_files_only: false

vocab_size: 21128
block_size: 512
n_layer: 16
n_head: 8
n_embd: 640
dropout: 0.1

max_depth: 32
num_states: 9
lambda_depth: 0.05
lambda_state: 0.1

batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 3.0e-4
min_lr: 3.0e-5
warmup_steps: 2000
weight_decay: 0.1
max_steps: 100000
eval_interval: 1000
save_interval: 5000
eval_iters: 20
grad_clip: 1.0
num_workers: 0

amp: true
amp_dtype: float16
float32_matmul_precision: high

streaming_train: true
streaming_valid: true
streaming_stride: 512
auto_streaming_min_bytes: 268435456

train_path: data/pretrain/pretrain_80m_train.jsonl
valid_path: data/pretrain/pretrain_80m_valid.jsonl
checkpoint_path: checkpoints/struct_pretrain_80m.pt
