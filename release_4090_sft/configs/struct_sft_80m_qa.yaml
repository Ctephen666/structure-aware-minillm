seed: 42

tokenizer_type: hf
tokenizer_name: uer/gpt2-chinese-cluecorpussmall
hf_cache_dir: .cache/huggingface
hf_local_files_only: false

vocab_size: 21128
block_size: 512
n_layer: 16
n_head: 8
n_embd: 640
dropout: 0.1

max_depth: 32
num_states: 9
lambda_depth: 0.02
lambda_state: 0.05

batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 1.0e-5
min_lr: 3.0e-6
warmup_steps: 500
weight_decay: 0.05
max_steps: 30000
max_train_seconds: 18000
eval_interval: 500
save_interval: 1000
eval_iters: 50
grad_clip: 1.0
num_workers: 0

amp: true
amp_dtype: float16
float32_matmul_precision: high

streaming_train: true
streaming_valid: true
streaming_stride: 512

train_path: data/sft/sft_train.jsonl
valid_path: data/sft/sft_valid.jsonl
init_from_checkpoint: checkpoints/struct_pretrain_80m.pt
resume_optimizer: false
checkpoint_path: checkpoints/struct_sft_80m_qa.pt
